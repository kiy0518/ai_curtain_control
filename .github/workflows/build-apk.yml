name: Build Android APK

# 수동 실행(Actions 탭의 Run workflow) 또는 app_flutter 변경 푸시 시 빌드.
on:
  workflow_dispatch:
  push:
    paths:
      - 'app_flutter/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 플랫폼 파일(android/) 생성 — 기존 pubspec/lib 는 유지
      - run: flutter create --platforms=android --org com.aicurtain --project-name ai_curtain_app .

      - name: Inject BLE permissions
        run: python3 ci_patch_manifest.py

      - run: flutter pub get
      - run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-curtain-apk
          path: app_flutter/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
